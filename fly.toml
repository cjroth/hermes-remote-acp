# Fly.io deployment — Tokyo (nrt), real kernel-TUN Tailscale.
# No [[services]]/[http_service] block => no public ingress; the agent is
# reachable ONLY over the tailnet (via `tailscale serve`).
app = "hermes-acp-nrt"
primary_region = "nrt"

[build]
  dockerfile = "Dockerfile"

[env]
  TS_HOSTNAME = "hermes-tokyo"

# One volume (Fly allows only one per machine) holds both Tailscale state
# (/data/tailscale) and Hermes home (/data/hermes) — see init.sh.
[[mounts]]
  source = "data"
  destination = "/data"
  initial_size = "1gb"

[[vm]]
  memory = "4gb"
  cpu_kind = "performance"
  cpus = 2
