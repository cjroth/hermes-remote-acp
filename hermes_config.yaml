model:
  # DeepSeek V4 Pro — open-weights, large-scale MoE variant tuned for advanced
  # reasoning and long-context tasks, native tool calling, 1M context. Stronger
  # (and slower/costlier) than the "flash" variant; still far cheaper than
  # Claude Sonnet 4.6.
  default: "deepseek/deepseek-v4-pro"
  provider: openrouter
  # Cap completion length per request — OpenRouter pre-authorizes the full
  # max_tokens against your credit balance, so an uncapped request reserves the
  # model's max output and can 402. 16000 is plenty for chat/agent turns; at
  # $0.87/M output that reserves only ~$0.014.
  max_tokens: 16000

# Web search tool (Firecrawl-backed). Hermes ships a first-class `web` search
# tool; without this block it stays unconfigured and the agent falls back to
# shelling out `curl` against DuckDuckGo/Brave HTML — which gets captcha'd and
# consent-gated on the VM (the failure mode that broke event-prospector's
# discovery pass). Enabling it here gives every search-using skill (prospector,
# event-prospector, lesswrong-digest) a real, scriptable search primitive.
#
# use_gateway: false → bring-your-own key: Hermes reads FIRECRAWL_API_KEY from
# the environment. Set it as a Fly secret (free Firecrawl tier covers periodic
# discovery at this volume):
#   fly secrets set FIRECRAWL_API_KEY=fc-...   (get one at firecrawl.dev)
# Flip to use_gateway: true to route through a paid Nous Portal subscription
# instead (one bill also covers image-gen / browser / TTS) — no key needed then.
web:
  backend: firecrawl
  use_gateway: false

# Matrix (Beeper) response streaming. transport "edit" = progressive m.replace
# edits, the native streaming mode for Matrix (it has no draft API). Combined
# with the Dockerfile buffer_only patch, the bot's reply grows live in Beeper
# instead of only updating at paragraph breaks. (The earlier "edit instability"
# note was a Telegram-era concern; Telegram is gone now, and Matrix is edit-only.)
#
# Rate-limit posture for a single encrypted Beeper DM: edit roughly once a second
# so we stay well under Beeper's per-room event limits. Raise edit_interval /
# buffer_threshold if you ever see M_LIMIT_EXCEEDED backoff in gateway.log.
streaming:
  enabled: true
  transport: edit
  edit_interval: 1.0      # min seconds between edits (~1 edit/s)
  buffer_threshold: 28    # ...or flush after this many new chars, whichever first
