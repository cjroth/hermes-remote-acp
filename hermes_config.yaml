model:
  # Kimi K2.6 (Moonshot) — open-weights agentic model, native tool calling +
  # parallel tool calls. ~4x cheaper than Claude Sonnet 4.6.
  default: "moonshotai/kimi-k2.6"
  provider: openrouter
  # Cap completion length per request. Kimi K2.6 reports a 262k max output, and
  # OpenRouter pre-authorizes the full max_tokens against your credit balance —
  # so without this cap each request reserves ~$0.90 and 402s. 16000 is plenty
  # for chat/agent turns and keeps the reservation to ~$0.05.
  max_tokens: 16000
