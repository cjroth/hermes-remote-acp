model:
  # DeepSeek V4 Flash — open-weights, speed-optimized ("flash") variant, native
  # tool calling, 1M context. Faster than Kimi K2.6 (no reasoning trace) and
  # ~30x cheaper input / ~75x cheaper output than Claude Sonnet 4.6.
  default: "deepseek/deepseek-v4-flash"
  provider: openrouter
  # Cap completion length per request — OpenRouter pre-authorizes the full
  # max_tokens against your credit balance, so an uncapped request reserves the
  # model's max output and can 402. 16000 is plenty for chat/agent turns; at
  # $0.20/M output that reserves only ~$0.003.
  max_tokens: 16000

# Telegram response streaming — the bot progressively edits its message as
# tokens arrive instead of waiting for the full reply. "edit" transport
# (progressive editMessageText) is the most compatible mode; Telegram's edit
# rate limits are handled by edit_interval/buffer_threshold defaults. Applied at
# gateway startup (NOT via an in-process restart, which is what crashed it
# before).
streaming:
  enabled: true
  transport: edit
